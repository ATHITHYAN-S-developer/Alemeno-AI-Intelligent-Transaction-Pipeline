services:
  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    restart: always

  api:
    build: .
    container_name: fastapi_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017/transaction_db
      REDIS_URI: redis://redis:6379/0
    depends_on:
      - mongo
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    container_name: celery_worker
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017/transaction_db
      REDIS_URI: redis://redis:6379/0
    depends_on:
      - mongo
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
    command: celery -A app.tasks worker --loglevel=info

volumes:
  redis_data:
  mongo_data:
